<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget OS</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter, system-ui;
    background:#f3f5fb;
}

/* HEADER */
.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    background:white;
    border-bottom:1px solid #e5e7eb;
}

.logo{font-weight:700}

/* LAYOUT */
.wrapper{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    padding:20px;
}

/* CARDS */
.card{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* KPI ROW */
.kpis{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.kpi{
    padding:15px;
    border-radius:14px;
    background:#f8fafc;
    text-align:center;
}

.kpi b{font-size:20px}

/* MAIN GRID */
.main{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-top:20px;
}

/* CHART */
.chart{
    height:260px;
}

/* DONUT */
.donut{
    height:260px;
}

/* SIDE */
.side .row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

/* COLORS */
.red{color:#ef4444}
.orange{color:#f97316}
.green{color:#22c55e}

</style>
</head>

<body>

<div class="header">
    <div class="logo">💰 Budget</div>
    <div id="user"></div>
</div>

<div class="wrapper">

<div>

<div class="card">

<div class="kpis">
<div class="kpi">Despesas<br><b id="despesas">0€</b></div>
<div class="kpi">Accruals<br><b id="accruals">0€</b></div>
<div class="kpi">Budget<br><b id="budget">0€</b></div>
</div>

<div class="main">

<div>
<canvas id="lineChart" class="chart"></canvas>
</div>

<div>
<canvas id="donutChart" class="donut"></canvas>
</div>

</div>

</div>

</div>

<div class="side">

<div class="card">
<b>Resumo</b>
<div class="row"><span>Despesas</span><span id="d1">0€</span></div>
<div class="row"><span>Accruals</span><span id="d2">0€</span></div>
<div class="row"><span>Disponível</span><span id="d3">0€</span></div>
</div>

<div class="card">
<b>Movimentos</b>
<div id="movimentos"></div>
</div>

</div>

</div>

<script>

const clientId="84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId="ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId="montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail="";
let lineChart,donutChart;

const msalInstance=new msal.PublicClientApplication({
auth:{clientId,authority:`https://login.microsoftonline.com/${tenantId}`,redirectUri:window.location.origin}
});

async function init(){

const acc=msalInstance.getAllAccounts();

if(acc.length===0){
const res=await msalInstance.loginPopup({scopes:["User.Read","Sites.ReadWrite.All"]});
userEmail=res.account.username;
}else{
userEmail=acc[0].username;
}

document.getElementById("user").innerText=userEmail;

load();
}

async function token(){
const acc=msalInstance.getAllAccounts()[0];
const res=await msalInstance.acquireTokenSilent({scopes:["User.Read","Sites.ReadWrite.All"],account:acc});
return res.accessToken;
}

async function load(){

const t=await token();

let despesas=0,accruals=0,budget=0;
let mov="";

const ano=new Date().getFullYear();

/* ACCRUAL */
const a=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
const da=await a.json();

da.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail)return;
const v=parseFloat(f.ValorEstimado)||0;
accruals+=v;
mov+=`<div class="item"><span>${f.Fornecedor}</span><span class="orange">+${v}€</span></div>`;
});

/* DESPESAS */
const d=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
const dd=await d.json();

dd.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail)return;
const v=parseFloat(f.Valor)||0;
despesas+=v;
mov+=`<div class="item"><span>${f.Fornecedor}</span><span class="red">-${v}€</span></div>`;
});

/* BUDGET */
const b=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/BudgetColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
const db=await b.json();

db.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail)return;
if(parseInt(f.Ano)!==ano)return;
budget+=parseFloat(f.ValorBudget)||0;
});

/* UI */
document.getElementById("despesas").innerText=despesas+"€";
document.getElementById("accruals").innerText=accruals+"€";
document.getElementById("budget").innerText=budget+"€";

document.getElementById("d1").innerText=despesas+"€";
document.getElementById("d2").innerText=accruals+"€";
document.getElementById("d3").innerText=(budget-despesas-accruals)+"€";

document.getElementById("movimentos").innerHTML=mov;

/* LINE CHART */
if(lineChart) lineChart.destroy();

lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[{
data:[0,0,0,0,despesas,accruals,0,0,0,0,0,0],
borderColor:"#6366f1",
backgroundColor:"rgba(99,102,241,0.1)",
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{color:"#eee"}}
}
}
});

/* DONUT */
if(donutChart) donutChart.destroy();

const total=despesas+accruals;
const rest=Math.max(budget-total,0);

donutChart=new Chart(document.getElementById("donutChart"),{
type:"doughnut",
data:{
datasets:[{
data:[total,rest],
backgroundColor:["#6366f1","#e5e7eb"]
}]
},
options:{
cutout:"75%",
plugins:{legend:{display:false}}
}
});

}

init();

</script>

</body>
</html>
