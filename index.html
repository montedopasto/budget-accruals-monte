<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget Control</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI, system-ui;
    background:#eef2f5;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:220px;
    height:100vh;
    background:#f8fafc;
    border-right:1px solid #e5e7eb;
    padding:20px;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:220px;
    width:calc(100% - 220px);
    height:60px;
    background:#2196f3;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

/* CONTENT */
.content{
    margin-left:220px;
    margin-top:60px;
    padding:20px;
}

/* CARDS */
.row{
    display:flex;
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    flex:1;
}

/* LIST */
.list{
    margin-top:20px;
}

.item{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}

/* INPUTS */
input{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

button{
    padding:8px 12px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>💰 Orçamento</h2>
    <div>Visão geral</div>
    <div>Accruals</div>
</div>

<!-- HEADER -->
<div class="header">
    <b>Visão geral</b>
    <span id="user"></span>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="row">
        <div class="card">
            <b>Total</b><br>
            <span id="total">0€</span>
        </div>

        <div class="card">
            <b>Registos</b><br>
            <span id="count">0</span>
        </div>
    </div>

    <div class="row" style="margin-top:20px">

        <div class="card" style="flex:2">
            <b>Accruals</b>
            <div class="list" id="lista"></div>
        </div>

        <div class="card">
            <b>Criar</b><br><br>

            <input id="fornecedor" placeholder="Fornecedor">
            <input id="valor" type="number" placeholder="€">

            <button onclick="criar()">Adicionar</button>
        </div>

    </div>

</div>

<script>

const clientId = "84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId = "ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId = "montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail = "";

const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId,
        authority:`https://login.microsoftonline.com/${tenantId}`,
        redirectUri:window.location.origin
    }
});

async function init(){

    const acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        const res = await msalInstance.loginPopup({
            scopes:["User.Read","Sites.ReadWrite.All"]
        });
        userEmail = res.account.username;
    }else{
        userEmail = acc[0].username;
    }

    document.getElementById("user").innerText = userEmail;

    load();
}

async function token(){
    const acc = msalInstance.getAllAccounts()[0];

    const res = await msalInstance.acquireTokenSilent({
        scopes:["User.Read","Sites.ReadWrite.All"],
        account:acc
    });

    return res.accessToken;
}

async function criar(){

    const fornecedor = document.getElementById("fornecedor").value.trim();
    const valor = parseFloat(document.getElementById("valor").value);

    if(!fornecedor || isNaN(valor)){
        alert("Preenche corretamente");
        return;
    }

    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornecedor,
                Fornecedor:fornecedor,
                ValorEstimado:valor,
                Estado:"Pendente",
                ColaboradorEmail:userEmail
            }
        })
    });

    document.getElementById("fornecedor").value = "";
    document.getElementById("valor").value = "";

    load();
}

async function load(){

    const t = await token();

    const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{
        headers:{Authorization:`Bearer ${t}`}
    });

    const data = await res.json();

    let total = 0;
    let count = 0;
    let html = "";

    if(!data.value){
        document.getElementById("lista").innerHTML = "Erro ao carregar dados";
        return;
    }

    data.value.forEach(i=>{

        const f = i.fields || {};

        if(f.ColaboradorEmail !== userEmail) return;

        const valor = parseFloat(f.ValorEstimado) || 0;

        total += valor;
        count++;

        html += `
        <div class="item">
            <div>${f.Fornecedor || "-"}</div>
            <div>${valor}€</div>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = total + "€";
    document.getElementById("count").innerText = count;
}

init();

</script>

</body>
</html>
