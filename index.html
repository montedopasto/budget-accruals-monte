<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget OS Premium</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter, system-ui;
    background:#f5f7fb;
}

/* TOP */
.top{
    height:70px;
    background:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid #e5e7eb;
}

.logo{
    font-weight:700;
    font-size:20px;
}

/* LAYOUT */
.main{
    display:grid;
    grid-template-columns:1fr 300px;
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* KPI */
.kpis{
    display:flex;
    gap:20px;
}

.kpi{
    flex:1;
    text-align:center;
}

.kpi b{
    font-size:20px;
}

/* CHART AREA */
.chart-area{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.bar{
    flex:2;
}

.donut{
    flex:1;
}

/* SIDE */
.side .item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

/* COLORS */
.red{color:#ef4444}
.green{color:#16a34a}
.blue{color:#3b82f6}

</style>
</head>

<body>

<div class="top">
    <div class="logo">💰 Budget</div>
    <div id="user"></div>
</div>

<div class="main">

<!-- LEFT -->
<div>

<div class="card">

<div class="kpis">

<div class="kpi">
Despesas<br><b id="despesas">0€</b>
</div>

<div class="kpi">
Accruals<br><b id="accruals">0€</b>
</div>

<div class="kpi">
Budget<br><b id="budget">0€</b>
</div>

</div>

<div class="chart-area">

<div class="bar">
<canvas id="barChart"></canvas>
</div>

<div class="donut">
<canvas id="donutChart"></canvas>
</div>

</div>

</div>

</div>

<!-- RIGHT -->
<div class="side">

<div class="card">
<b>Movimentos</b>
<div id="movimentos"></div>
</div>

</div>

</div>

<script>

const clientId="84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId="ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId="montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail="";
let barChart,donutChart;

const msalInstance=new msal.PublicClientApplication({
auth:{clientId,authority:`https://login.microsoftonline.com/${tenantId}`,redirectUri:window.location.origin}
});

async function init(){

const acc=msalInstance.getAllAccounts();

if(acc.length===0){
const res=await msalInstance.loginPopup({scopes:["User.Read","Sites.ReadWrite.All"]});
userEmail=res.account.username;
}else{
userEmail=acc[0].username;
}

document.getElementById("user").innerText=userEmail;

load();
}

async function token(){
const acc=msalInstance.getAllAccounts()[0];
const res=await msalInstance.acquireTokenSilent({scopes:["User.Read","Sites.ReadWrite.All"],account:acc});
return res.accessToken;
}

async function load(){

const t=await token();

let despesas=0;
let accruals=0;
let budget=0;
let movimentosHTML="";

const anoAtual=new Date().getFullYear();

/* ACCRUALS */
const resA=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{
headers:{Authorization:`Bearer ${t}`}
});
const dataA=await resA.json();

dataA.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail) return;

const val=parseFloat(f.ValorEstimado)||0;
accruals+=val;

movimentosHTML+=`
<div class="item">
<div>
<b>${f.Fornecedor}</b><br>
<small style="color:#94a3b8">Accrual</small>
</div>
<div class="blue">+${val}€</div>
</div>`;
});

/* DESPESAS */
const resD=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items?$expand=fields`,{
headers:{Authorization:`Bearer ${t}`}
});
const dataD=await resD.json();

dataD.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail) return;

const val=parseFloat(f.Valor)||0;
despesas+=val;

movimentosHTML+=`
<div class="item">
<div>
<b>${f.Fornecedor}</b><br>
<small style="color:#94a3b8">Despesa</small>
</div>
<div class="red">-${val}€</div>
</div>`;
});

/* BUDGET */
const resB=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/BudgetColaboradores/items?$expand=fields`,{
headers:{Authorization:`Bearer ${t}`}
});
const dataB=await resB.json();

dataB.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail) return;
if(parseInt(f.Ano)!==anoAtual) return;

budget+=parseFloat(f.ValorBudget)||0;
});

/* UI */
document.getElementById("despesas").innerText=despesas+"€";
document.getElementById("accruals").innerText=accruals+"€";
barChart=new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Despesas","Accruals"],
datasets:[{
data:[despesas,accruals],
backgroundColor:["#ef4444","#3b82f6"],
borderRadius:8,
barThickness:40
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false}},
y:{grid:{color:"#eee"}}
}
}
});

/* CHART DONUT */
if(donutChart) donutChart.destroy();
const totalUsado = despesas + accruals;
const restante = Math.max(budget - totalUsado,0);

donutChart=new Chart(document.getElementById("donutChart"),{
type:"doughnut",
data:{
labels:["Usado","Livre"],
datasets:[{
data:[totalUsado,restante],
backgroundColor:["#fb923c","#e5e7eb"],
borderWidth:0
}]
},
options:{
cutout:"75%",
plugins:{
legend:{display:false}
}
}
});
type:"doughnut",
data:{
labels:["Usado","Livre"],
datasets:[{
data:[despesas+accruals,Math.max(budget-(despesas+accruals),0)]
}]
},
options:{
cutout:"70%",
plugins:{legend:{display:false}}
}
});

}

init();

</script>

</body>
</html>
