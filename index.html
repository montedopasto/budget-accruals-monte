<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget App</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#eef2f5;
}

/* TOPBAR */
.topbar{
    height:60px;
    background:#2196f3;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

/* MENU */
.menu{
    display:flex;
    gap:20px;
    margin-left:20px;
}

.menu div{
    cursor:pointer;
}

/* CONTENT */
.content{
    padding:20px;
}

/* CARDS */
.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    flex:1;
}

/* PROGRESS BAR */
.progress{
    width:100%;
    height:20px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#16a34a;
    transition:0.3s;
}

/* HISTÓRICO */
.mov{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #e5e7eb;
}

.mov-left{
    display:flex;
    flex-direction:column;
}

.mov-tipo{
    font-size:12px;
    color:#64748b;
}

.mov-valor{
    font-weight:700;
}

.despesa{ color:#dc2626; }
.accrual{ color:#2563eb; }

/* SECTIONS */
.hidden{
    display:none;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:10px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:6px;
}

</style>

</head>
<body>

<div class="topbar">
    <div style="display:flex; align-items:center;">
        <b>💰 Budget</b>
        <div class="menu">
            <div onclick="show('dashboard')">Dashboard</div>
            <div onclick="show('despesas')">Despesas</div>
            <div onclick="show('accruals')">Accruals</div>
        </div>
    </div>
    <div id="user"></div>
</div>

<div class="content">

    <div id="dashboard">

        <div class="row">
            <div class="card">Budget<br><b id="budget">0€</b></div>
            <div class="card">Despesas<br><b id="despesasTotal">0€</b></div>
            <div class="card">Accruals<br><b id="accrualTotal">0€</b></div>
            <div class="card">Diferença<br><b id="diferenca">0€</b></div>
        </div>

        <div class="card">
            <b>Consumo do Budget</b>
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="percentagem"></div>
        </div>

        <div class="card">
            <b>Movimentos</b>
            <div id="historico"></div>
        </div>

    </div>

    <div id="despesas" class="hidden">
        <h3>Nova Despesa</h3>
        <input id="fornDespesa" placeholder="Fornecedor">
        <input id="valorDespesa" type="number" placeholder="Valor">
        <button onclick="criarDespesa()">Guardar</button>
    </div>

    <div id="accruals" class="hidden">
        <h3>Novo Accrual</h3>
        <input id="fornAcc" placeholder="Fornecedor">
        <input id="valorAcc" type="number" placeholder="Valor">
        <button onclick="criarAccrual()">Guardar</button>
    </div>

</div>

<script>

const clientId = "84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId = "ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId = "montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail = "";

const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId,
        authority:`https://login.microsoftonline.com/${tenantId}`,
        redirectUri:window.location.origin
    }
});

function show(tab){
    ["dashboard","despesas","accruals"].forEach(t=>{
        document.getElementById(t).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

async function init(){
    const acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        const res = await msalInstance.loginPopup({
            scopes:["User.Read","Sites.ReadWrite.All"]
        });
        userEmail = res.account.username;
    }else{
        userEmail = acc[0].username;
    }

    document.getElementById("user").innerText = userEmail;
    loadDashboard();
}

async function token(){
    const acc = msalInstance.getAllAccounts()[0];
    const res = await msalInstance.acquireTokenSilent({
        scopes:["User.Read","Sites.ReadWrite.All"],
        account:acc
    });
    return res.accessToken;
}

async function criarDespesa(){
    const fornecedor = document.getElementById("fornDespesa").value;
    const valor = parseFloat(document.getElementById("valorDespesa").value);
    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornecedor,
                Fornecedor:fornecedor,
                Valor:valor,
                ColaboradorEmail:userEmail
            }
        })
    });

    loadDashboard();
}

async function criarAccrual(){
    const fornecedor = document.getElementById("fornAcc").value;
    const valor = parseFloat(document.getElementById("valorAcc").value);
    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornecedor,
                Fornecedor:fornecedor,
                ValorEstimado:valor,
                ColaboradorEmail:userEmail
            }
        })
    });

    loadDashboard();
}

async function loadDashboard(){

    const t = await token();

    let totalAccrual = 0;
    let totalDespesas = 0;
    let budget = 0;
    let movimentos = [];

    const anoAtual = new Date().getFullYear();

    const acc = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
    const dataAcc = await acc.json();

    if(dataAcc.value){
        dataAcc.value.forEach(i=>{
            const f = i.fields || {};
            if(f.ColaboradorEmail !== userEmail) return;
            const val = parseFloat(f.ValorEstimado)||0;
            totalAccrual += val;
            movimentos.push({tipo:"Accrual", fornecedor:f.Fornecedor, valor:val, data:new Date(i.createdDateTime)});
        });
    }

    const desp = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
    const dataDesp = await desp.json();

    if(dataDesp.value){
        dataDesp.value.forEach(i=>{
            const f = i.fields || {};
            if(f.ColaboradorEmail !== userEmail) return;
            const val = parseFloat(f.Valor)||0;
            totalDespesas += val;
            movimentos.push({tipo:"Despesa", fornecedor:f.Fornecedor, valor:val, data:new Date(i.createdDateTime)});
        });
    }

    const bud = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/BudgetColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
    const dataBudget = await bud.json();

    if(dataBudget.value){
        dataBudget.value.forEach(i=>{
            const f = i.fields || {};
            if(f.ColaboradorEmail !== userEmail) return;
            if(parseInt(f.Ano) !== anoAtual) return;
            budget += parseFloat(f.ValorBudget)||0;
        });
    }

    const totalUsado = totalDespesas + totalAccrual;
    const percent = budget>0 ? (totalUsado/budget)*100 : 0;

    document.getElementById("budget").innerText = budget+"€";
    document.getElementById("despesasTotal").innerText = totalDespesas+"€";
    document.getElementById("accrualTotal").innerText = totalAccrual+"€";
    document.getElementById("diferenca").innerText = (budget-totalUsado)+"€";

    document.getElementById("progressBar").style.width = percent+"%";
    document.getElementById("percentagem").innerText = percent.toFixed(1)+"% usado";

    movimentos.sort((a,b)=> b.data - a.data);

    let html="";
    movimentos.forEach(m=>{
        html+=`
        <div class="mov">
            <div class="mov-left">
                <div>${m.fornecedor||"-"}</div>
                <div class="mov-tipo">${m.tipo}</div>
            </div>
            <div class="mov-valor ${m.tipo==="Despesa"?"despesa":"accrual"}">
                ${m.tipo==="Despesa"?"-":"+"}${m.valor}€
            </div>
        </div>`;
    });

    document.getElementById("historico").innerHTML = html;
}

init();

</script>

</body>
</html>
