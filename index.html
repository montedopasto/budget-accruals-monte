<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget App</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#eef2f5;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    width:260px;
    height:100vh;
    background:#f8fafc;
    border-right:1px solid #ddd;
    padding:20px;
}

.menu div{
    margin:10px 0;
    cursor:pointer;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:260px;
    width:calc(100% - 260px);
    height:60px;
    background:#2196f3;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
    font-size:16px;
}

/* CONTENT */
.content{
    margin-left:260px;
    margin-top:60px;
    padding:20px;
}

/* CARDS */
.row{
    display:flex;
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    flex:1;
}

/* HIDDEN */
.hidden{
    display:none;
}

input{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

button{
    padding:8px 12px;
    background:#16a34a;
    color:white;
    border:none;
}

</style>

</head>
<body>

<div class="sidebar">
    <h2>💰 Budget</h2>

    <div class="menu">
        <div onclick="show('dashboard')">Dashboard</div>
        <div onclick="show('despesas')">Despesas</div>
        <div onclick="show('accruals')">Accruals</div>
    </div>
</div>

<div class="header">
    <div><b>App Financeira</b></div>
    <div id="user"></div>
</div>

<div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard">

        <div class="row">
            <div class="card">
                Budget<br><b id="budget">0€</b>
            </div>

            <div class="card">
                Despesas<br><b id="despesasTotal">0€</b>
            </div>

            <div class="card">
                Accruals<br><b id="accrualTotal">0€</b>
            </div>

            <div class="card">
                Diferença<br><b id="diferenca">0€</b>
            </div>
        </div>

    </div>

    <!-- DESPESAS -->
    <div id="despesas" class="hidden">

        <h3>Nova Despesa</h3>

        <input id="fornDespesa" placeholder="Fornecedor">
        <input id="valorDespesa" type="number" placeholder="Valor">

        <button onclick="criarDespesa()">Guardar</button>

    </div>

    <!-- ACCRUALS -->
    <div id="accruals" class="hidden">

        <h3>Novo Accrual</h3>

        <input id="fornAcc" placeholder="Fornecedor">
        <input id="valorAcc" type="number" placeholder="Valor">

        <button onclick="criarAccrual()">Guardar</button>

    </div>

</div>

<script>

const clientId = "84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId = "ee417351-ea90-41e0-9147-5ea6ab38ea49";

let userEmail = "";

const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId,
        authority:`https://login.microsoftonline.com/${tenantId}`,
        redirectUri:window.location.origin
    }
});

function show(tab){

    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("despesas").classList.add("hidden");
    document.getElementById("accruals").classList.add("hidden");

    document.getElementById(tab).classList.remove("hidden");
}

async function init(){

    const acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        const res = await msalInstance.loginPopup({
            scopes:["User.Read"]
        });
        userEmail = res.account.username;
    }else{
        userEmail = acc[0].username;
    }

    document.getElementById("user").innerText = userEmail;
}

async function criarDespesa(){
    alert("Despesa registada (vamos ligar ao SharePoint a seguir)");
}

async function criarAccrual(){
    alert("Accrual registado (vamos ligar ao SharePoint a seguir)");
}

init();

</script>

</body>
</html>
