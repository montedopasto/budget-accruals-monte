<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget OS</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter, system-ui;
    background:#f6f8fc;
}

/* HEADER */
.header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    background:white;
    border-bottom:1px solid #e5e7eb;
}

.logo{font-weight:700}

/* MENU */
.menu{
    display:flex;
    gap:20px;
}

.menu div{
    cursor:pointer;
    padding:6px 12px;
    border-radius:8px;
}

.menu div.active{
    background:#6366f1;
    color:white;
}

/* LAYOUT */
.layout{
    display:grid;
    grid-template-columns:1fr 320px;
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* KPIS */
.kpis{
    display:flex;
    gap:15px;
}

.kpi{
    flex:1;
    background:#f9fafb;
    border-radius:14px;
    padding:15px;
}

.kpi span{
    font-size:12px;
    color:#94a3b8;
}

.kpi b{
    font-size:22px;
}

/* GRID */
.main{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-top:20px;
}

.chart{height:260px}
.donut{height:260px}

/* SIDE */
.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.mov{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

/* FORMS */
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    padding:10px;
    width:100%;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:8px;
}

/* COLORS */
.red{color:#ef4444}
.orange{color:#f97316}
.green{color:#22c55e}
.gray{color:#94a3b8}

.hidden{display:none}

</style>
</head>

<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:30px;">
        <div class="logo">💰 Budget</div>

        <div class="menu">
            <div class="active" onclick="show('dashboard',this)">Dashboard</div>
            <div onclick="show('despesas',this)">Despesas</div>
            <div onclick="show('accruals',this)">Accruals</div>
        </div>
    </div>

    <div id="user"></div>
</div>

<div id="dashboard">

<div class="layout">

<div>

<div class="card">

<div class="kpis">
<div class="kpi"><span>Despesas</span><br><b id="despesas">0€</b></div>
<div class="kpi"><span>Accruals</span><br><b id="accruals">0€</b></div>
<div class="kpi"><span>Budget</span><br><b id="budget">0€</b></div>
</div>

<div class="main">

<div><canvas id="lineChart" class="chart"></canvas></div>

<div><canvas id="donutChart" class="donut"></canvas></div>

</div>

</div>

</div>

<div>

<div class="card">
<b>Resumo</b>
<div class="row"><span>Despesas</span><span id="r1">0€</span></div>
<div class="row"><span>Accruals</span><span id="r2">0€</span></div>
<div class="row"><span>Disponível</span><span id="r3">0€</span></div>
</div>

<div class="card">
<b>Movimentos</b>
<div id="movimentos"></div>
</div>

</div>

</div>

</div>

<!-- DESPESAS -->
<div id="despesas" class="hidden" style="padding:20px;">
<div class="card">
<h3>Nova Despesa</h3>
<input id="f1" placeholder="Fornecedor">
<input id="v1" type="number" placeholder="Valor">
<button onclick="addDespesa()">Guardar</button>
</div>
</div>

<!-- ACCRUALS -->
<div id="accruals" class="hidden" style="padding:20px;">
<div class="card">
<h3>Novo Accrual</h3>
<input id="f2" placeholder="Fornecedor">
<input id="v2" type="number" placeholder="Valor">
<button onclick="addAccrual()">Guardar</button>
</div>
</div>

<script>

const clientId="84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId="ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId="montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail="";
let lineChart,donutChart;

const msalInstance=new msal.PublicClientApplication({
auth:{clientId,authority:`https://login.microsoftonline.com/${tenantId}`,redirectUri:window.location.origin}
});

function show(tab,el){

document.querySelectorAll(".menu div").forEach(m=>m.classList.remove("active"));
el.classList.add("active");

document.getElementById("dashboard").classList.add("hidden");
document.getElementById("despesas").classList.add("hidden");
document.getElementById("accruals").classList.add("hidden");

document.getElementById(tab).classList.remove("hidden");
}

async function init(){

const acc=msalInstance.getAllAccounts();

if(acc.length===0){
const res=await msalInstance.loginPopup({scopes:["User.Read","Sites.ReadWrite.All"]});
userEmail=res.account.username;
}else{
userEmail=acc[0].username;
}

document.getElementById("user").innerText=userEmail;

load();
}

async function token(){
const acc=msalInstance.getAllAccounts()[0];
const res=await msalInstance.acquireTokenSilent({scopes:["User.Read","Sites.ReadWrite.All"],account:acc});
return res.accessToken;
}

async function addDespesa(){

const t=await token();

await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items`,{
method:"POST",
headers:{Authorization:`Bearer ${t}`,"Content-Type":"application/json"},
body:JSON.stringify({fields:{Title:f1.value,Fornecedor:f1.value,Valor:parseFloat(v1.value),ColaboradorEmail:userEmail}})
});

load();
}

async function addAccrual(){

const t=await token();

await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items`,{
method:"POST",
headers:{Authorization:`Bearer ${t}`,"Content-Type":"application/json"},
body:JSON.stringify({fields:{Title:f2.value,Fornecedor:f2.value,ValorEstimado:parseFloat(v2.value),ColaboradorEmail:userEmail}})
});

load();
}

async function load(){

const t=await token();

let despesas=0,accruals=0,budget=0,mov="";

const ano=new Date().getFullYear();

/* ACCRUALS */
const a=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
const da=await a.json();

da.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail)return;
const v=parseFloat(f.ValorEstimado)||0;
accruals+=v;
mov+=`<div class="mov"><span>${f.Fornecedor}</span><span class="orange">+${v}€</span></div>`;
});

/* DESPESAS */
const d=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
const dd=await d.json();

dd.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail)return;
const v=parseFloat(f.Valor)||0;
despesas+=v;
mov+=`<div class="mov"><span>${f.Fornecedor}</span><span class="red">-${v}€</span></div>`;
});

/* BUDGET */
const b=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/BudgetColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
const db=await b.json();

db.value?.forEach(i=>{
const f=i.fields||{};
if(f.ColaboradorEmail!==userEmail)return;
if(parseInt(f.Ano)!==ano)return;
budget+=parseFloat(f.ValorBudget)||0;
});

/* UI */
despesasEl.innerText=despesas+"€";
accrualsEl.innerText=accruals+"€";
budgetEl.innerText=budget+"€";

r1.innerText=despesas+"€";
r2.innerText=accruals+"€";
r3.innerText=(budget-despesas-accruals)+"€";

movimentos.innerHTML=mov;

/* CHART */
if(lineChart) lineChart.destroy();

lineChart=new Chart(lineChartEl,{
type:"line",
data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],
datasets:[{
data:[0,0,0,0,despesas,accruals,0,0,0,0,0,0],
borderColor:"#6366f1",
backgroundColor:"rgba(99,102,241,0.1)",
fill:true,
tension:0.4
}]
},
options:{plugins:{legend:{display:false}}}
});

/* DONUT */
if(donutChart) donutChart.destroy();

const total=despesas+accruals;
const rest=Math.max(budget-total,0);

donutChart=new Chart(donutChartEl,{
type:"doughnut",
data:{
datasets:[{
data:[total,rest],
backgroundColor:["#6366f1","#e5e7eb"]
}]
},
options:{cutout:"75%",plugins:{legend:{display:false}}}
});

}

const despesasEl=document.getElementById("despesas");
const accrualsEl=document.getElementById("accruals");
const budgetEl=document.getElementById("budget");
const lineChartEl=document.getElementById("lineChart");
const donutChartEl=document.getElementById("donutChart");

init();

</script>

</body>
</html>
