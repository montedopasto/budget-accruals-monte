<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget Control</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI, system-ui;
    background:#eef2f5;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    background:#f8fafc;
    position:fixed;
    border-right:1px solid #e5e7eb;
    padding:20px;
}

.sidebar h2{
    font-size:18px;
    margin-bottom:30px;
}

.sidebar div{
    margin:12px 0;
    color:#334155;
}

/* HEADER */
.header{
    margin-left:240px;
    height:60px;
    background:#2196f3;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

/* CONTENT */
.content{
    margin-left:240px;
    width:calc(100% - 240px);
}
    padding:20px;
}

/* CARDS */
.row{
    display:flex;
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    flex:1;
}

.title{
    font-size:13px;
    color:#64748b;
}

.value{
    font-size:20px;
    font-weight:600;
}

/* LIST */
.list{
    margin-top:20px;
}

.item{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}

</style>

</head>
<body>

<div class="sidebar">
    <h2>💰 Orçamento</h2>
    <div>Visão geral</div>
    <div>Accruals</div>
</div>

<div class="header">
    <b>Visão geral</b>
    <span id="user"></span>
</div>

<div class="content">

    <div class="row">
        <div class="card">
            <div class="title">Total</div>
            <div class="value" id="total">0€</div>
        </div>

        <div class="card">
            <div class="title">Este mês</div>
            <div class="value" id="mes">0€</div>
        </div>

        <div class="card">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <div class="row" style="margin-top:20px">
        <div class="card" style="flex:2">
            <b>Accruals</b>
            <div class="list" id="lista"></div>
        </div>

        <div class="card">
            <b>Criar</b>

            <input id="fornecedor" placeholder="Fornecedor"><br><br>
            <input id="valor" type="number" placeholder="€"><br><br>

            <button onclick="criar()">Adicionar</button>
        </div>
    </div>

</div>

<script>

const clientId = "84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId = "ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId = "montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail = "";

const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId,
        authority:`https://login.microsoftonline.com/${tenantId}`,
        redirectUri:window.location.origin
    }
});

async function init(){

    const acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        const res = await msalInstance.loginPopup({scopes:["User.Read","Sites.ReadWrite.All"]});
        userEmail = res.account.username;
    }else{
        userEmail = acc[0].username;
    }

    document.getElementById("user").innerText = userEmail;

    load();
}

async function token(){
    const acc = msalInstance.getAllAccounts()[0];
    const res = await msalInstance.acquireTokenSilent({
        scopes:["User.Read","Sites.ReadWrite.All"],
        account:acc
    });
    return res.accessToken;
}

async function criar(){

    const fornecedor = document.getElementById("fornecedor").value;
    const valor = parseFloat(document.getElementById("valor").value);

    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornecedor,
                Fornecedor:fornecedor,
                ValorEstimado:valor,
                Estado:"Pendente",
                ColaboradorEmail:userEmail
            }
        })
    });

    load();
}

async function load(){

    const t = await token();

    const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{
        headers:{Authorization:`Bearer ${t}`}
    });

    const data = await res.json();

    let total=0;
    let html="";

    const valores=[];

    data.value.forEach(i=>{

        const f = i.fields;

        if(f.ColaboradorEmail!==userEmail) return;

        total += f.ValorEstimado;

        valores.push(f.ValorEstimado);

        html += `
        <div class="item">
            <div>${f.Fornecedor}</div>
            <div>${f.ValorEstimado}€</div>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = total + "€";
    document.getElementById("mes").innerText = total + "€";

    new Chart(document.getElementById("chart"),{
        type:'bar',
        data:{
            labels:valores.map((_,i)=>"A"+(i+1)),
            datasets:[{data:valores}]
        }
    });
}

init();

</script>

</body>
</html>
