<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget OS</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<style>

*{box-sizing:border-box}

body{
    margin:0;
    font-family:Inter, system-ui;
    background:#f1f5f9;
}

/* LAYOUT */
.app{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:linear-gradient(180deg,#4f46e5,#3730a3);
    color:white;
    padding:25px;
}

.logo{
    font-size:22px;
    font-weight:600;
    margin-bottom:40px;
}

.menu div{
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:8px;
}

.menu div:hover{
    background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
    flex:1;
    padding:25px;
    overflow:auto;
}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* BIG CARD */
.big{
    grid-column:span 2;
}

/* VALUE */
.value{
    font-size:26px;
    font-weight:700;
}

/* HISTORY */
.mov{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.despesa{color:#dc2626}
.accrual{color:#2563eb}

/* FORM */
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #e5e7eb;
    border-radius:8px;
}

button{
    padding:10px;
    width:100%;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.hidden{display:none}

</style>

</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">💰 Budget OS</div>

        <div class="menu">
            <div onclick="show('dashboard')">Dashboard</div>
            <div onclick="show('despesas')">Despesas</div>
            <div onclick="show('accruals')">Accruals</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top">
            <h2>Dashboard</h2>
            <div id="user"></div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">

            <div class="grid">

                <div class="card">
                    Budget
                    <div class="value" id="budget">0€</div>
                </div>

                <div class="card">
                    Despesas
                    <div class="value" id="despesasTotal">0€</div>
                </div>

                <div class="card">
                    Accruals
                    <div class="value" id="accrualTotal">0€</div>
                </div>

                <div class="card big">
                    <b>Histórico</b>
                    <div id="historico"></div>
                </div>

                <div class="card">
                    Diferença
                    <div class="value" id="diferenca">0€</div>
                </div>

            </div>

        </div>

        <!-- DESPESAS -->
        <div id="despesas" class="hidden">
            <div class="card">
                <h3>Nova Despesa</h3>
                <input id="fornDespesa" placeholder="Fornecedor">
                <input id="valorDespesa" type="number" placeholder="Valor">
                <button onclick="criarDespesa()">Guardar</button>
            </div>
        </div>

        <!-- ACCRUALS -->
        <div id="accruals" class="hidden">
            <div class="card">
                <h3>Novo Accrual</h3>
                <input id="fornAcc" placeholder="Fornecedor">
                <input id="valorAcc" type="number" placeholder="Valor">
                <button onclick="criarAccrual()">Guardar</button>
            </div>
        </div>

    </div>

</div>

<script>

const clientId = "84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId = "ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId = "montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail="";

const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId,
        authority:`https://login.microsoftonline.com/${tenantId}`,
        redirectUri:window.location.origin
    }
});

function show(tab){
    ["dashboard","despesas","accruals"].forEach(t=>{
        document.getElementById(t).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

async function init(){

    const acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        const res = await msalInstance.loginPopup({
            scopes:["User.Read","Sites.ReadWrite.All"]
        });
        userEmail = res.account.username;
    }else{
        userEmail = acc[0].username;
    }

    document.getElementById("user").innerText = userEmail;
    load();
}

async function token(){
    const acc = msalInstance.getAllAccounts()[0];
    const res = await msalInstance.acquireTokenSilent({
        scopes:["User.Read","Sites.ReadWrite.All"],
        account:acc
    });
    return res.accessToken;
}

async function criarDespesa(){

    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornDespesa.value,
                Fornecedor:fornDespesa.value,
                Valor:parseFloat(valorDespesa.value),
                ColaboradorEmail:userEmail
            }
        })
    });

    load();
}

async function criarAccrual(){

    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornAcc.value,
                Fornecedor:fornAcc.value,
                ValorEstimado:parseFloat(valorAcc.value),
                ColaboradorEmail:userEmail
            }
        })
    });

    load();
}

async function load(){

    const t = await token();

    let despesas=0;
    let accruals=0;
    let movimentos=[];

    const a = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
    const da = await a.json();

    if(da.value){
        da.value.forEach(i=>{
            const f=i.fields||{};
            if(f.ColaboradorEmail!==userEmail)return;
            const v=parseFloat(f.ValorEstimado)||0;
            accruals+=v;
            movimentos.push({tipo:"Accrual",fornecedor:f.Fornecedor,valor:v,data:new Date(i.createdDateTime)});
        });
    }

    const d = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/DespesasColaboradores/items?$expand=fields`,{headers:{Authorization:`Bearer ${t}`}});
    const dd = await d.json();

    if(dd.value){
        dd.value.forEach(i=>{
            const f=i.fields||{};
            if(f.ColaboradorEmail!==userEmail)return;
            const v=parseFloat(f.Valor)||0;
            despesas+=v;
            movimentos.push({tipo:"Despesa",fornecedor:f.Fornecedor,valor:v,data:new Date(i.createdDateTime)});
        });
    }

    const budget=1000;

    document.getElementById("budget").innerText=budget+"€";
    document.getElementById("despesasTotal").innerText=despesas+"€";
    document.getElementById("accrualTotal").innerText=accruals+"€";
    document.getElementById("diferenca").innerText=(budget-despesas-accruals)+"€";

    movimentos.sort((a,b)=>b.data-a.data);

    let html="";
    movimentos.forEach(m=>{
        html+=`<div class="mov">
            <div>${m.fornecedor}</div>
            <div class="${m.tipo==='Despesa'?'despesa':'accrual'}">
                ${m.tipo==='Despesa'?'-':'+'}${m.valor}€
            </div>
        </div>`;
    });

    document.getElementById("historico").innerHTML=html;
}

init();

</script>

</body>
</html>
