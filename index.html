<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Budget Control</title>

<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI, system-ui, sans-serif;
    background:#eef2f5;
    color:#111827;
}

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    background:#f8fafc;
    border-right:1px solid #e5e7eb;
    padding:24px;
}

.sidebar h2{
    margin:20px 0 30px 0;
    font-size:24px;
}

.sidebar div{
    margin:10px 0;
    font-size:17px;
}

.header{
    position:fixed;
    top:0;
    left:260px;
    width:calc(100% - 260px);
    height:64px;
    background:#2196f3;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    font-size:18px;
    z-index:5;
}

.content{
    margin-left:260px;
    padding:88px 24px 24px 24px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    flex:1;
    min-height:92px;
}

.card-title{
    color:#64748b;
    font-size:14px;
    margin-bottom:6px;
}

.card-value{
    font-size:24px;
    font-weight:700;
}

.list-card{
    flex:2;
}

.form-card{
    max-width:420px;
}

.item{
    padding:16px 0;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
}

.item:last-child{
    border-bottom:none;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #cbd5e1;
    border-radius:4px;
    font-size:15px;
}

button{
    padding:10px 16px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#15803d;
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>💰 Orçamento</h2>
    <div>Visão geral</div>
    <div>Accruals</div>
</div>

<div class="header">
    <strong>Visão geral</strong>
    <span id="user"></span>
</div>

<div class="content">
<div class="row" style="margin-bottom:20px">

    <div class="card" style="max-width:200px">
        <div class="card-title">Ano</div>
        <select id="ano" onchange="load()">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
        </select>
    </div>

    <div class="card" style="max-width:200px">
        <div class="card-title">Mês</div>
        <select id="mes" onchange="load()">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>
    </div>

</div>
    <div class="row">
        <div class="card">
            <div class="card-title">Total</div>
            <div class="card-value" id="total">0€</div>
        </div>

        <div class="card">
            <div class="card-title">Registos</div>
            <div class="card-value" id="count">0</div>
        </div>
    </div>

    <div class="row">
        <div class="card list-card">
            <h3>Accruals</h3>
            <div id="lista"></div>
        </div>

        <div class="card form-card">
            <h3>Criar</h3>

            <input id="fornecedor" placeholder="Fornecedor">
            <input id="valor" type="number" placeholder="Valor em €">

            <button onclick="criar()">Adicionar</button>
        </div>
    </div>

</div>

<script>
const clientId = "84a548f9-d082-4e9b-b639-1b34432df8c8";
const tenantId = "ee417351-ea90-41e0-9147-5ea6ab38ea49";
const siteId = "montedopastopt.sharepoint.com,210d4489-0c97-4ee7-9384-51cb3808d59a,d1a6f091-93b5-4454-b6e2-809ad4e4d73a";

let userEmail = "";

const msalInstance = new msal.PublicClientApplication({
    auth:{
        clientId,
        authority:`https://login.microsoftonline.com/${tenantId}`,
        redirectUri:window.location.origin
    }
});

async function init(){
    const acc = msalInstance.getAllAccounts();

    if(acc.length===0){
        const res = await msalInstance.loginPopup({
            scopes:["User.Read","Sites.ReadWrite.All"]
        });
        userEmail = res.account.username;
    }else{
        userEmail = acc[0].username;
    }

    document.getElementById("user").innerText = userEmail;
    load();
}

async function token(){
    const acc = msalInstance.getAllAccounts()[0];

    const res = await msalInstance.acquireTokenSilent({
        scopes:["User.Read","Sites.ReadWrite.All"],
        account:acc
    });

    return res.accessToken;
}

async function criar(){
    const fornecedor = document.getElementById("fornecedor").value.trim();
    const valor = parseFloat(document.getElementById("valor").value);

    if(!fornecedor || isNaN(valor)){
        alert("Preenche corretamente o fornecedor e o valor.");
        return;
    }

    const t = await token();

    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items`,{
        method:"POST",
        headers:{
            Authorization:`Bearer ${t}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            fields:{
                Title:fornecedor,
                Fornecedor:fornecedor,
                ValorEstimado:valor,
                Estado:"Pendente",
                ColaboradorEmail:userEmail
            }
        })
    });

    document.getElementById("fornecedor").value = "";
    document.getElementById("valor").value = "";

    load();
}

async function load(){
    const t = await token();

    const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/AccrualsColaboradores/items?$expand=fields`,{
        headers:{Authorization:`Bearer ${t}`}
    });

    const data = await res.json();

    let total = 0;
    let count = 0;
    let html = "";

    if(!data.value){
        document.getElementById("lista").innerHTML = "Erro ao carregar dados.";
        return;
    }

    data.value.forEach(i=>{
        const f = i.fields || {};

        if(f.ColaboradorEmail !== userEmail) return;

        const valor = parseFloat(f.ValorEstimado) || 0;

        total += valor;
        count++;

        html += `
<div class="item" style="flex-direction:column; align-items:flex-start;">
    
    <div style="width:100%; display:flex; justify-content:space-between;">
        <div style="font-weight:600;">${f.Fornecedor || "-"}</div>
        <div style="font-weight:700;">${valor.toFixed(2)}€</div>
    </div>

    <div style="font-size:13px; color:#64748b; margin-top:4px;">
        ${f.Descricao || "Sem descrição"}
    </div>

    <div style="font-size:12px; color:#94a3b8; margin-top:2px;">
        ${f.MesReferencia || "-"} / ${f.AnoReferencia || "-"}
    </div>

</div>`;
    });

    if(html === ""){
        html = "<p>Sem accruals registados.</p>";
    }

    document.getElementById("lista").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2) + "€";
    document.getElementById("count").innerText = count;
}

init();
</script>

</body>
</html>
